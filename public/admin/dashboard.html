<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Admin - Tokoko</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 min-h-screen p-6">
  <div class="max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-4">
        <a href="/"
          class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-2xl text-sm font-semibold transition text-center">
          &larr; Kembali ke Chat
        </a>
        <div>
          <h1 class="text-2xl font-bold text-gray-800">Dashboard Admin</h1>
          <p class="text-gray-500 text-sm">Kelola system prompt Tokoko</p>
        </div>
      </div>
      <form action="/admin/logout" method="POST">
        <button type="submit"
          class="bg-red-500 hover:bg-red-600 text-white px-5 py-2.5 rounded-2xl text-sm font-semibold transition shadow-md">
          Logout
        </button>
      </form>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl p-6 border border-green-200">
      <form action="/admin/update-prompt" method="POST" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">System Prompt (Training Data)</label>
          <textarea id="promptArea" name="prompt" rows="30"
            class="w-full px-4 py-3 bg-gray-50 rounded-2xl text-sm text-gray-700 font-mono leading-relaxed border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>
        </div>
        <div class="flex gap-3">
          <button type="submit"
            class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-2xl font-semibold text-sm transition shadow-md">
            Simpan Perubahan
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    fetch('/api/prompt')
      .then(r => r.json())
      .then(data => {
        document.getElementById('promptArea').value = data.prompt;
      });
  </script>
</body>
</html>
