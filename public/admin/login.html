<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Tokoko</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8 border border-green-200">
    <div class="text-center mb-8">
      <div id="errorIcon" class="w-16 h-16 bg-green-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">🔐</div>
      <h1 class="text-2xl font-bold text-gray-800">Admin Tokoko</h1>
      <p id="errorMsg" class="text-gray-500 text-sm mt-1">Masuk untuk mengelola prompt</p>
    </div>
    <form action="/admin/login" method="POST" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" required
          class="w-full px-4 py-3 bg-gray-100 rounded-2xl text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
          class="w-full px-4 py-3 bg-gray-100 rounded-2xl text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500" />
      </div>
      <button type="submit"
        class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-2xl font-semibold text-sm transition shadow-md">
        Masuk
      </button>
    </form>
    <p class="text-center text-xs text-gray-400 mt-6">
      <a href="/" class="text-green-600 hover:underline">&larr; Kembali ke Tokoko</a>
    </p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === '1') {
      document.getElementById('errorIcon').className = 'w-16 h-16 bg-red-100 rounded-full flex items-center justify-center text-3xl mx-auto mb-4';
      document.getElementById('errorIcon').textContent = '❌';
      document.getElementById('errorMsg').className = 'text-red-500 text-sm mt-1';
      document.getElementById('errorMsg').textContent = 'Username atau password salah';
    }
  </script>
</body>
</html>
